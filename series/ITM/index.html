<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inside the Marshmallow</title>
  <meta name="description" content="Inside the Marshmallow — by your uncle attaboy" />
  <style>
    :root {
      --soft-shadow: rgba(180,130,220,.3);
      --frosted-bg:  rgba(255,255,255,.45);
      --frosted-border: rgba(255,255,255,.65);
      --fg:          #3a2a4a;
      --muted:       rgba(58,42,74,.55);
      --accent:      #c8a0e0;
      --accent-glow: rgba(200,160,224,.5);
      --pill-border: rgba(180,130,220,.45);
      --nav-size:    clamp(40px,6vw,64px);
    }

    *, *::before, *::after { box-sizing: border-box; }

    /* Slow-drifting pastel background — the inside of the marshmallow */
    @keyframes pastel-drift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    html {
      background: linear-gradient(-45deg,
        #fce8f5, #e8d5ff, #d5e8ff,
        #d5ffee, #fff5d5, #ffd5e8);
      background-size: 400% 400%;
      animation: pastel-drift 22s ease infinite;
    }

    html, body {
      margin: 0;
      height: 100%;
      color: var(--fg);
      font: 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; }

    /* ── Header — frosted glass ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      background: var(--frosted-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--frosted-border);
      box-shadow: 0 2px 16px rgba(200,160,224,.15);
    }
    header a {
      color: var(--accent);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity .15s;
    }
    header a:hover { opacity: .7; }
    header h1 {
      margin: 0;
      font-size: clamp(.75rem,2vw,.92rem);
      font-weight: 600;
      letter-spacing: .01em;
      color: var(--fg);
      opacity: .85;
      line-height: 1.3;
    }

    /* ── Viewer ── */
    #viewer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    /* Soft gleam in top-left corner of the viewer */
    #viewer::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 15% 10%,
        rgba(255,255,255,.22) 0%,
        transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    #comic-page {
      display: block;
      max-width: min(100%, calc((100vh - 140px) * 0.75));
      max-height: calc(100vh - 140px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 18px;
      /* Soft pastel glow instead of harsh black shadow */
      box-shadow:
        0 8px 40px var(--soft-shadow),
        0 0 0 1px rgba(255,255,255,.5);
      transition: opacity .2s ease;
      cursor: zoom-in;
      touch-action: none;
      position: relative;
      z-index: 1;
    }
    #comic-page.fading { opacity: 0; }

    /* ── Edge nav hit areas ── */
    .nav-btn {
      position: absolute;
      top: 0; bottom: 0;
      width: 22%;
      max-width: 120px;
      display: flex;
      align-items: center;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 10;
      transition: background .18s, opacity .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.1); }
    .nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -3px; }
    #btn-prev { left: 0;  justify-content: flex-start; padding-left: 14px; }
    #btn-next { right: 0; justify-content: flex-end;   padding-right: 14px; }
    .nav-btn svg {
      width: var(--nav-size); height: var(--nav-size);
      opacity: 0;
      transition: opacity .18s;
      filter: drop-shadow(0 0 6px rgba(200,160,224,.6));
    }
    .nav-btn:hover svg,
    .nav-btn:focus-visible svg { opacity: 1; }
    .nav-btn[disabled] { cursor: default; pointer-events: none; }
    .nav-btn.hidden    { opacity: 0; pointer-events: none; }

    /* ── Footer — frosted glass ── */
    footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 10px 18px;
      background: var(--frosted-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--frosted-border);
      box-shadow: 0 -2px 16px rgba(200,160,224,.12);
      flex-wrap: wrap;
    }
    #page-counter {
      font-size: .82rem;
      letter-spacing: .07em;
      color: var(--muted);
      min-width: 80px;
      text-align: center;
    }

    /* Soft pill buttons */
    .pill-btn {
      background: rgba(255,255,255,.55);
      border: 1.5px solid var(--pill-border);
      color: var(--fg);
      border-radius: 99px;
      padding: 5px 18px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s, box-shadow .15s, opacity .2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .pill-btn:hover {
      background: rgba(255,255,255,.75);
      border-color: var(--accent);
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .pill-btn:disabled { opacity: .3; cursor: default; }

    #btn-zoom-reset {
      border-color: var(--accent);
      color: var(--accent);
      opacity: 0;
      pointer-events: none;
    }
    #btn-zoom-reset.visible { opacity: 1; pointer-events: auto; }
    #btn-zoom-reset:hover { background: rgba(200,160,224,.15); }

    /* Pastel dots */
    #dots { display: flex; gap: 6px; align-items: center; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(180,130,220,.3);
      transition: background .18s, transform .18s, box-shadow .18s;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.35);
      box-shadow: 0 0 6px var(--accent-glow);
    }

    footer small {
      font-size: .7rem;
      color: var(--muted);
      opacity: .7;
      display: none;
    }
    @media (min-width: 600px) { footer small { display: block; } }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>

  <header>
    <a href="https://www.fluffyhandsome.com/"><span aria-hidden="true">←</span> Home</a>
    <h1>Inside the Marshmallow &ensp;·&ensp; by your uncle attaboy</h1>
  </header>

  <div id="viewer" role="region" aria-label="Comic reader">
    <button id="btn-prev" class="nav-btn" aria-label="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <img id="comic-page" src="img/001.png" alt="Page 1" decoding="async" />

    <button id="btn-next" class="nav-btn" aria-label="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <footer>
    <button class="pill-btn" id="foot-prev" aria-label="Previous page">&#8592; Prev</button>
    <div id="dots" aria-hidden="true"></div>
    <span id="page-counter" aria-live="polite" aria-atomic="true">1 / 43</span>
    <button class="pill-btn" id="foot-next" aria-label="Next page">Next &#8594;</button>
    <button class="pill-btn" id="btn-zoom-reset" aria-label="Reset zoom">Reset zoom</button>
    <small>Click to zoom &nbsp;·&nbsp; scroll or pinch to adjust</small>
  </footer>

  <script>
    const pages = [
      { src: 'img/001.png', alt: 'Page 1'  }, { src: 'img/002.png', alt: 'Page 2'  },
      { src: 'img/003.png', alt: 'Page 3'  }, { src: 'img/004.png', alt: 'Page 4'  },
      { src: 'img/005.png', alt: 'Page 5'  }, { src: 'img/006.png', alt: 'Page 6'  },
      { src: 'img/007.png', alt: 'Page 7'  }, { src: 'img/008.png', alt: 'Page 8'  },
      { src: 'img/009.png', alt: 'Page 9'  }, { src: 'img/010.png', alt: 'Page 10' },
      { src: 'img/011.png', alt: 'Page 11' }, { src: 'img/012.png', alt: 'Page 12' },
      { src: 'img/013.png', alt: 'Page 13' }, { src: 'img/014.png', alt: 'Page 14' },
      { src: 'img/015.png', alt: 'Page 15' }, { src: 'img/016.png', alt: 'Page 16' },
      { src: 'img/017.png', alt: 'Page 17' }, { src: 'img/018.png', alt: 'Page 18' },
      { src: 'img/019.png', alt: 'Page 19' }, { src: 'img/020.png', alt: 'Page 20' },
      { src: 'img/021.png', alt: 'Page 21' }, { src: 'img/022.png', alt: 'Page 22' },
      { src: 'img/023.png', alt: 'Page 23' }, { src: 'img/024.png', alt: 'Page 24' },
      { src: 'img/025.png', alt: 'Page 25' }, { src: 'img/026.png', alt: 'Page 26' },
      { src: 'img/027.png', alt: 'Page 27' }, { src: 'img/028.png', alt: 'Page 28' },
      { src: 'img/029.png', alt: 'Page 29' }, { src: 'img/030.png', alt: 'Page 30' },
      { src: 'img/031.png', alt: 'Page 31' }, { src: 'img/032.png', alt: 'Page 32' },
      { src: 'img/033.png', alt: 'Page 33' }, { src: 'img/034.png', alt: 'Page 34' },
      { src: 'img/035.png', alt: 'Page 35' }, { src: 'img/036.png', alt: 'Page 36' },
      { src: 'img/037.png', alt: 'Page 37' }, { src: 'img/038.png', alt: 'Page 38' },
      { src: 'img/039.png', alt: 'Page 39' }, { src: 'img/040.png', alt: 'Page 40' },
      { src: 'img/041.png', alt: 'Page 41' }, { src: 'img/042.png', alt: 'Page 42' },
      { src: 'img/043.png', alt: 'Page 43' },
    ];

    let current = 0;
    const img       = document.getElementById('comic-page');
    const viewer    = document.getElementById('viewer');
    const counter   = document.getElementById('page-counter');
    const btnPrev   = document.getElementById('btn-prev');
    const btnNext   = document.getElementById('btn-next');
    const footPrev  = document.getElementById('foot-prev');
    const footNext  = document.getElementById('foot-next');
    const dotsEl    = document.getElementById('dots');
    const zoomReset = document.getElementById('btn-zoom-reset');

    // ── Dots ──
    pages.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dotsEl.appendChild(d);
    });
    const dots = dotsEl.querySelectorAll('.dot');

    // ── Preload ──
    const cache = {};
    function preload(i) {
      if (i >= 0 && i < pages.length && !cache[i]) {
        const im = new Image(); im.src = pages[i].src; cache[i] = im;
      }
    }

    // ── Navigation ──
    function goTo(n, { instant = false } = {}) {
      if (n < 0 || n >= pages.length || n === current) return;
      resetZoom(true);

      const go = () => {
        current = n;
        img.src = pages[current].src;
        img.alt = pages[current].alt;
        counter.textContent = `${current + 1} / ${pages.length}`;
        btnPrev.disabled  = current === 0;
        footPrev.disabled = current === 0;
        btnNext.disabled  = current === pages.length - 1;
        footNext.disabled = current === pages.length - 1;
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
        preload(current + 1);
        preload(current - 1);
      };

      if (instant) { go(); return; }
      img.classList.add('fading');
      setTimeout(() => { go(); img.classList.remove('fading'); }, 200);
    }

    btnPrev.addEventListener('click',  () => goTo(current - 1));
    btnNext.addEventListener('click',  () => goTo(current + 1));
    footPrev.addEventListener('click', () => goTo(current - 1));
    footNext.addEventListener('click', () => goTo(current + 1));

    // ── Zoom & Pan ──
    const MIN_SCALE = 1, MAX_SCALE = 6;
    let scale = 1, panX = 0, panY = 0, fitW = 0, fitH = 0;

    function captureFitSize() { fitW = img.offsetWidth; fitH = img.offsetHeight; }

    function clampPan() {
      const vr = viewer.getBoundingClientRect();
      const maxX = Math.max(0, (fitW * scale - vr.width)  / 2);
      const maxY = Math.max(0, (fitH * scale - vr.height) / 2);
      panX = Math.max(-maxX, Math.min(maxX, panX));
      panY = Math.max(-maxY, Math.min(maxY, panY));
    }

    function applyZoom() {
      img.style.width    = fitW * scale + 'px';
      img.style.height   = fitH * scale + 'px';
      img.style.maxWidth  = 'none';
      img.style.maxHeight = 'none';
      clampPan();
      img.style.transform = `translate(${panX}px, ${panY}px)`;
      img.style.cursor = 'grab';
      btnPrev.classList.add('hidden');
      btnNext.classList.add('hidden');
      zoomReset.classList.add('visible');
    }

    function resetZoom() {
      scale = 1; panX = 0; panY = 0;
      img.style.width = img.style.height = '';
      img.style.maxWidth = img.style.maxHeight = '';
      img.style.transform = '';
      img.style.cursor = 'zoom-in';
      btnPrev.classList.remove('hidden');
      btnNext.classList.remove('hidden');
      zoomReset.classList.remove('visible');
    }

    function zoomToward(clientX, clientY, newScale) {
      newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
      if (newScale === scale) return;
      if (scale <= 1.01) captureFitSize();
      const vr  = viewer.getBoundingClientRect();
      const vcx = vr.left + vr.width  / 2;
      const vcy = vr.top  + vr.height / 2;
      const ox  = clientX - vcx - panX;
      const oy  = clientY - vcy - panY;
      panX = clientX - vcx - ox * (newScale / scale);
      panY = clientY - vcy - oy * (newScale / scale);
      scale = newScale;
      if (scale <= 1.01) resetZoom();
      else applyZoom();
    }

    zoomReset.addEventListener('click', () => resetZoom());

    // ── Mouse: click-to-toggle & drag-to-pan ──
    let mouseDown = false, didDrag = false;
    let dragStartX, dragStartY, panAtDragX, panAtDragY;

    img.addEventListener('mousedown', e => {
      e.preventDefault();
      mouseDown = true; didDrag = false;
      dragStartX = e.clientX; dragStartY = e.clientY;
      panAtDragX = panX;      panAtDragY = panY;
      if (scale > 1.01) img.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', e => {
      if (!mouseDown) return;
      const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
      if (scale > 1.01) { panX = panAtDragX + dx; panY = panAtDragY + dy; applyZoom(); img.style.cursor = 'grabbing'; }
    });
    document.addEventListener('mouseup', () => { mouseDown = false; if (scale > 1.01) img.style.cursor = 'grab'; });

    img.addEventListener('click', e => {
      if (didDrag) { didDrag = false; return; }
      if (scale > 1.01) { resetZoom(); }
      else { captureFitSize(); zoomToward(e.clientX, e.clientY, 2.5); }
    });

    // ── Scroll-wheel zoom ──
    viewer.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaMode === 1 ? e.deltaY * 40 : e.deltaY;
      zoomToward(e.clientX, e.clientY, scale * Math.exp(-delta * 0.004));
    }, { passive: false });

    // ── Touch ──
    let activetouches = {}, lastPinchDist = null, touchAnchor = null, lastTapTime = 0;

    function dist2(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
    function mid2(a, b)  { return { x: (a.clientX+b.clientX)/2, y: (a.clientY+b.clientY)/2 }; }

    img.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => { activetouches[t.identifier] = t; });
      const ids = Object.keys(activetouches);
      if (ids.length === 1) {
        const t = e.changedTouches[0];
        touchAnchor = { x: t.clientX, y: t.clientY, t: Date.now(), panX, panY };
        lastPinchDist = null;
        const now = Date.now();
        if (now - lastTapTime < 300) {
          lastTapTime = 0;
          if (scale > 1.01) resetZoom(); else { captureFitSize(); zoomToward(t.clientX, t.clientY, 2.5); }
        } else { lastTapTime = now; }
      } else if (ids.length === 2) {
        const [a, b] = Object.values(activetouches);
        lastPinchDist = dist2(a, b); touchAnchor = null;
      }
    }, { passive: false });

    img.addEventListener('touchmove', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => { activetouches[t.identifier] = t; });
      const ids = Object.keys(activetouches);
      if (ids.length === 2) {
        const [a, b] = Object.values(activetouches);
        const d = dist2(a, b), m = mid2(a, b);
        if (lastPinchDist !== null) { if (scale <= 1.01) captureFitSize(); zoomToward(m.x, m.y, scale * (d / lastPinchDist)); }
        lastPinchDist = d; touchAnchor = null;
      } else if (ids.length === 1 && touchAnchor && scale > 1.01) {
        const t = Object.values(activetouches)[0];
        panX = touchAnchor.panX + (t.clientX - touchAnchor.x);
        panY = touchAnchor.panY + (t.clientY - touchAnchor.y);
        applyZoom();
      }
    }, { passive: false });

    function onTouchEnd(e) {
      Array.from(e.changedTouches).forEach(t => { delete activetouches[t.identifier]; });
      lastPinchDist = null;
      if (Object.keys(activetouches).length === 0 && touchAnchor) {
        const t = e.changedTouches[0];
        const dx = t.clientX - touchAnchor.x, dt = Date.now() - touchAnchor.t;
        if (scale <= 1.01 && Math.abs(dx) > 40 && dt < 400) goTo(dx < 0 ? current + 1 : current - 1);
        touchAnchor = null;
      }
    }
    img.addEventListener('touchend',    onTouchEnd, { passive: false });
    img.addEventListener('touchcancel', onTouchEnd, { passive: false });

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
      if (e.key === '=' || e.key === '+') { const vr = viewer.getBoundingClientRect(); zoomToward(vr.left + vr.width/2, vr.top + vr.height/2, scale * 1.3); }
      if (e.key === '-' || e.key === '_') { const vr = viewer.getBoundingClientRect(); zoomToward(vr.left + vr.width/2, vr.top + vr.height/2, scale / 1.3); }
      if (e.key === '0') resetZoom();
    });

    window.addEventListener('resize', () => { if (scale > 1.01) applyZoom(); });

    // ── Init ──
    goTo(0, { instant: true });
    preload(1);
  </script>
</body>
</html>
